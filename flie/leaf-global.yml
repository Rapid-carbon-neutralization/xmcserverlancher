
# Leaf 配置
# 
# 官网: https://www.leafmc.one/zh/
# 文档: https://www.leafmc.one/zh/docs/getting-started
# GitHub 仓库: https://github.com/Winds-Studio/Leaf
# QQ社区群: 619278377
config-version: '3.0'

###########
#  ASYNC  #
###########
async:
  # 使区块数据包准备和发送异步化以提高服务器性能.
  # 当许多玩家同时加载区块时, 这可以显著减少主线程负载.
  async-chunk-send:
    enabled: false
  # 是否异步化生物生成.
  # 在实体较多的服务器上, 异步生成可最高带来 15% 的性能提升.
  # 须在Paper配置文件中打开 per-player-mob-spawns 才能生效.
  async-mob-spawning:
    enabled: true
  async-pathfinding:
    enabled: false
    max-threads: 0
    keepalive: 60
    queue-size: 0
    # 当队列满时, 新提交的任务将使用以下策略处理.
    # FLUSH_ALL: 所有等待中的任务都将在主线程上运行.
    # CALLER_RUNS: 新提交的任务将在主线程上运行.
    reject-policy: FLUSH_ALL
  # 异步保存玩家数据.
  async-playerdata-save:
    enabled: false
  # ** 实验性功能 **
  # 异步实体跟踪,
  # 在实体数量多且密集的情况下效果明显.
  async-entity-tracker:
    enabled: false
    threads: 0
  # **实验性功能**
  # 启用并行世界处理以提高多核 CPU 使用率.
  parallel-world-ticking:
    enabled: false
    threads: 8
    log-container-creation-stacktraces: false
    disable-hard-throw: false
    async-unsafe-read-handling: DISABLED

##########
#  PERF  #
##########
performance:
  check-survival-before-growth:
    # 在仙人掌生长前检查其是否能够存活。
    cactus-check-survival: false
  despawn-time:
    # 启用主动弱加载实体消失检查，
    # 这是一个实验性功能。
    proactive-weak-loading-despawn: false
  dont-save-entity:
    # 区块卸载时不保存掉落的方块和激活的 TNT,
    # 可以避免在玩家掉线时机器被炸毁.
    dont-save-primed-tnt: false
    dont-save-falling-block: false
  # 根据距离动态优化生物 AI
  dab:
    enabled: false
    # 启用此项后, 在水中的非水生生物将不会被 DAB 影响.
    # 可以避免距离玩家较远的生物在水里淹死.
    dont-enable-if-in-water: false
    # 生物距离玩家多少格 DAB 开始生效
    start-distance: 12
    # 最远处的实体每隔多少刻tick一次
    max-tick-freq: 20
    # This value defines how much distance modifies an entity's
    # tick frequency. freq = (distanceToPlayer^2) / (2^value)",
    # If you want further away entities to tick less often, use 7.
    # If you want further away entities to tick more often, try 9.
    activation-dist-mod: 8
    # 不会被 DAB 影响的实体列表
    blacklisted-entities:
    - villager
    - axolotl
    - hoglin
    - zombified_piglin
    - goat
  # 是否缓存Minecraft到Bukkit的实体类型转换.
  enable-cached-minecraft-to-bukkit-entitytype-convert: true
  entity-goal:
    start-tick-chance:
      nearest-attackable-target: -1
      follow-parent: -1
      avoid-entity: -1
      temptation: -1
      enderman-look-for-player: -1
  fast-biome-manager-seed-obfuscation:
    # 将原版 BiomeManager 的 SHA-256 种子混淆换成 XXHash.
    enabled: false
    # XXHash 的混淆种子.
    seed-obfuscation-key: -9012882787358272298
  # 是否使用更快的随机生成器?
  # 需要支持 Xoroshiro128PlusPlus 的 JVM.
  # 一些 JRE 不支持此功能.
  faster-random-generator:
    enabled: false
    # 是否为世界生成启用更快的随机生成器.
    # 警告: 此项会影响世界生成!!!
    enable-for-worldgen: false
    # 是否在没有为史莱姆区块使用原版随机生成器的情况下进行警告.
    warn-for-slime-chunk: true
    # 是否使用原版随机生成器来生成史莱姆区块.
    use-legacy-random-for-slime-chunk: false
  # 更快的结构生成任务分段.
  faster-structure-gen-future-sequencing: true
  # 实验性功能
  # 复用 BlockPos 以略微减少内存分配，提升 random ticking 的性能.
  # 可能与某些插件或操作冲突，如出现位置异常请关闭.
  reuse-random-ticking-blockpos: false
  cache-biome:
    enabled: false
    mob-spawning: false
    advancements: false
  optimize-block-entities: true
  optimize-mob-despawn: false
  # 是否只对主手和副手中的物品进行 tick / 更新，而不是整个物品栏中的所有物品。
  only-tick-items-in-hand: false
  optimize-mob-spawning: false
  optimize-no-action-time:
    disable-light-check: false
  # 是否优化玩家移动处理，跳过不必要的边缘检查并避免冗余的视距更新。
  optimize-player-movement: true
  optimize-random-tick: false
  optimize-waypoint: false
  # 是否使用铁轨优化。
  # 优化实现基于 GitHub@FxMori 的 RailOptimization 模组。
  optimized-powered-rails: false
  reduce-packets:
    reduce-entity-move-packets: false
    reduce-entity-motion-packets: false
    disable-useless-particles: false
  skip-ai-for-non-aware-mob: true
  datapack:
    # execute 命令执行时跳过不活跃实体.
    # 将会提升有大量数据包函数的服务器性能.
    skip-inactive-entity-for-execute-command: false
  skip-map-item-data-updates-if-map-does-not-have-craftmaprenderer: true
  sleeping-block-entity: false
  # 跳过区块中重复失败次数至少达到 `min-failed` 的生物生成.
  # `spawn-chance` 的有效范围为 0.0 到 100.0.
  # 达到生成限制时, 失败计数器不会增加.
  throttle-mob-spawning:
    enabled: false
    monster:
      min-failed: 8
      spawn-chance: 25.0
    creature:
      min-failed: 8
      spawn-chance: 25.0
    ambient:
      min-failed: 8
      spawn-chance: 25.0
    axolotls:
      min-failed: 8
      spawn-chance: 25.0
    underground_water_creature:
      min-failed: 8
      spawn-chance: 25.0
    water_creature:
      min-failed: 8
      spawn-chance: 25.0
    water_ambient:
      min-failed: 8
      spawn-chance: 25.0
  create-snapshot-on-retrieving-blockstate: true
  use-virtual-thread:
    # 是否为 Bukkit 异步任务调度器使用虚拟线程.
    bukkit-async-scheduler: false
    # 是否为 Folia 异步任务调度器使用虚拟线程.
    folia-async-scheduler: false
    # 是否为异步聊天线程使用虚拟线程.
    async-chat-executor: true
    # 是否为档案查询执行器使用虚拟线程。
    download-pool: false
    # 是否为用户验证使用虚拟线程.
    auth-pool: true
    # 是否为 Paper 在配置阶段的任务池使用虚拟线程.
    paper-configuration-pool: true

###########
#  FIXES  #
###########
fixes:
  # 针对 Minecraft 原版的漏洞修复。
  vanilla-bug-fix:
    # 是否修复“还要啥火箭啊？”进度触发的错误检查逻辑。
    # 漏洞跟踪器链接：https://mojira.dev/MC-270656
    mc-270656: false
    # 是否修复战斗跟踪器（Combat Tracker）中，因生物受到持续性伤害导致的内存泄漏。
    # 漏洞跟踪器链接：https://mojira.dev/MC-301114
    mc-301114: false
    # 生物战斗跟踪器中允许的最大条目。
    mc-301114-max-entries: 10240
    # 是否修复末地船在区块边缘生成时被截断的问题。
    # 漏洞跟踪器链接：https://mojira.dev/MC-152094
    mc-152094: false
  # 阻止实体进入弱加载区块。
  prevent-moving-into-weak-loaded-chunks:
    # 设置为 true 以启用以下功能。
    enabled: false
    # 阻止弹射物进入弱加载区块。
    projectiles: false

##############
#  GAMEPLAY  #
##############
gameplay-mechanisms:
  afk-command:
    # 基于原版 idle-timeout 系统的 AFK 指令
    # 剩余配置项在 Purpur 配置里
    enabled: false
  inventory-overflow-event:
    # 此事件将在插件使用 Inventory#addItem 方法
    # 添加物品到玩家背包, 但是背包已满时调用.
    # 不建议使用此事件，请尽快迁移至使用 Inventory#addItem 方法
    # 返回的 map
    enabled: false
    # 监听此物品栏物品溢出事件的完整类名.
    listener-class: com.example.package.PlayerInventoryOverflowEvent
  player:
    # 玩家 UseItem 的最大距离.
    # 设置为 -1 来禁用最大距离检测.
    # 注意: 禁用此项后,
    # 玩家可以使用作弊客户端的部分发包模块和 NoCom 漏洞!!
    max-use-item-distance: 1.0000001
  allow-tripwire-dupe: false
  death-item-drop-knockback:
    # 如果为 “true”，物品会在玩家死亡时随机掉落在其周围.
    drop-around: true
    # 随机掉落物品时水平速度的基本速度.
    horizontal-force: 0.5
    # 随机掉落物品的向上运动.
    vertical-force: 0.2
  ice-and-snow-chance: 48
  knockback:
    # 使雪球可以击退玩家.
    snowball-knockback-players: false
    # 使鸡蛋可以击退玩家.
    egg-knockback-players: false
    # 使玩家可以击退僵尸.
    can-player-knockback-zombie: true
    # 被击退时立即同步玩家.
    flush-location-while-knockback-player: false
    old-blast-protection-explosion-knockback: false
  # 是否只允许玩家被实体推动
  only-player-pushable: false
  # 此部分包含刷怪笼生物生成的设置.
  spawner-settings:
    # 启用自定义刷怪笼设置. 设为 true 以启用以下所有功能.
    enabled: false
    # 可以为刷怪笼启用或禁用的各种检查.
    checks:
      # 检查是否有所需的光照等级来生成怪物
      light-level-check: false
      # 检查附近是否已达到最大怪物数量限制
      spawner-max-nearby-check: true
      # 检查是否有玩家在生成怪物的半径范围内
      check-for-nearby-players: true
      # 检查是否有物理方块阻挡生成位置, 或自定义生成规则(isValidPosition)因方块条件失败.
      spawner-block-checks: false
      # 检查周围是否有水阻止生成
      water-prevent-spawn-check: false
      # 忽略特定于生物的生成规则, 例如动物需要草方块或特定的生物群系/方块 (不影响光照等级或物理障碍物检查).
      ignore-spawn-rules: false
    # 刷怪笼生成怪物之间的最小延迟 (以刻为单位). 较高的值会减缓刷怪笼的速度.
    min-spawn-delay: 200
    # 刷怪笼生成怪物之间的最大延迟 (以刻为单位). 较高的值会减缓刷怪笼的速度.
    max-spawn-delay: 800
  use-spigot-item-merging-mechanism: false
  use-vanilla-hopper: false

#############
#  NETWORK  #
#############
network:
  # 异步切换连接状态.
  async-switch-state: false
  # 是否启用聊天签名, 禁用后玩家无法进行聊天举报.
  chat-message-signature: true
  # 警告: 此选项与 ProtocolLib 不兼容, 并可能导致与其他修改数据包
  # 处理的插件出现问题.
  # 
  # 通过使用 Netty 的 lazyExecute 方法来优化非刷新数据包的发送,
  # 避免在调度数据包操作时进行昂贵的线程唤醒调用.
  # 
  # 需要重启服务器才能生效.
  OptimizeNonFlushPacketSending: false
  protocol-support:
    strict-mode: false
    jade-protocol: false
    appleskin-protocol: false
    appleskin-protocol-sync-tick-interval: 20
    asteorbar-protocol: false
    chatimage-protocol: false
    xaero-map-protocol: false
    xaero-map-server-id: 479787891
    syncmatica-protocol: false
    syncmatica-quota: false
    syncmatica-quota-limit: 40000000
    do-a-barrel-roll-protocol: false
    do-a-barrel-roll-allow-thrusting: false
    do-a-barrel-roll-force-enabled: false
    do-a-barrel-roll-force-installed: false
    do-a-barrel-roll-installed-timeout: 0

##########
#  MISC  #
##########
misc:
  # 自定义加入 & 退出消息 (MiniMessage 格式), 设置为 'default' 将使用原版消息.
  # 可用的内置变量:
  # <player_name> - 玩家名称
  # <player_displayname> - 玩家显示名称
  connection-message:
    join:
      enabled: true
      # 玩家加入服务器时的消息
      message: default
    quit:
      enabled: true
      # 玩家退出服务器时的消息
      message: default
  disable-world-data-saving:
    # 此处列出的世界将跳过世界数据持久化。
    # 区块/实体更改仅保留在内存中直到卸载或重启，不会写入磁盘。
    worlds: []
  including-5s-in-get-tps: true
  # 这部分包含滞后补偿功能,
  # 可以在卡顿情况下保障基本游戏体验.
  lag-compensation:
    enabled: false
    enable-for-water: false
    enable-for-lava: false
  # Linear 是一种使用 zstd 压缩而非 ZLIB 的区域格式.
  # 该格式可节省约 50% 的磁盘空间.
  # 使用前请阅读 Leaf 文档!
  region-format:
    # 可用格式: MCA, B_LINEAR, LINEAR_V2
    format-name: MCA
    compress-level: 6
    io-thread-count: 6
    io-flush-delay: -1
    linear-use-virtual-thread: true
  # 移除修改无法编辑的告示牌时输出的警告.
  remove-change-non-editable-sign-warning: false
  # 使服务器无需打开 bungee 模式即可让玩家加入后端服务器.
  remove-spigot-check-bungee-config: false
  # 安全种子开启后, 所有矿物与结构都将使用1024位的种子进行生成, 无法被破解.
  secure-seed:
    enabled: false
  sentry:
    # Sentry DSN (出现严重错误时将发送至配置的Sentry DSN地址) (留空关闭)
    dsn: ''
    # 大于等于该等级的日志会被记录.
    log-level: WARN
    # 是否仅记录带有 Throwable 的日志.
    only-log-thrown: true
  rebrand:
    server-mod-name: Leaf
    server-gui-name: Leaf Console
  message:
    # 发送未知命令时的消息, 使用 MiniMessage 格式, 设置为 "default" 使用原版消息.
    # 变量:
    # <message>, 显示命令错误所附提示消息.
    # <detail>, 显示命令错误详细信息.
    unknown-command: default
  vanilla-username-check:
    # 移除原版的用户名验证,
    # 让所有字符均可作为玩家名.
    # 警告: 完全移除验证非常不安全, 使用风险自负!
    remove-all-check: false
    # 强制启用头颅验证,
    # 避免所有者带有特殊字符的头颅导致客户端掉线.
    enforce-skull-validation: true
    # 允许老玩家加入修改用户名验证正则后的服务器,
    # 即使他们的用户名不满足修改后的正则.
    allow-old-players-join: false
    # 使用用户名正则来验证用户名,
    # 只允许正则指定的字符.
    use-username-regex: false
    # 用户名正则,
    # 指定允许在用户名中使用的字符.
    # 默认: ^[a-zA-Z0-9_.]*$
    username-regex: ^[a-zA-Z0-9_.]*$
